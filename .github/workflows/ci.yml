name: CI — JobsHour Web

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  # Botón "Run workflow" en GitHub → Actions → CI — JobsHour Web (sin push ni SSH manual)
  workflow_dispatch:

concurrency:
  group: jobshour-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_PUSHER_KEY: ${{ secrets.NEXT_PUBLIC_PUSHER_KEY }}
          NEXT_PUBLIC_PUSHER_CLUSTER: ${{ secrets.NEXT_PUBLIC_PUSHER_CLUSTER }}
        run: npm run build

  deploy:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/jobshour-web
            git fetch origin
            git checkout master
            git reset --hard origin/master
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm ci --prefer-offline
            npm run build
            echo "=== BUILD OK, reiniciando jobshour-web ==="
            pm2 reload jobshour-web --update-env
            echo "=== DEPLOY OK: $(date) ==="
            pm2 list
